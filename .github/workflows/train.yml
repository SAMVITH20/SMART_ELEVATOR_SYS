name: Elevator RL CI

on: [push]

jobs:

  train:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v3

    - name: Setup Python

      uses: actions/setup-python@v4

      with:
        python-version: "3.10"

    - name: Install Dependencies

      run: pip install -r requirements.txt

    - name: Run QLearning

      run: python train.py configs/qlearning_v1.yaml